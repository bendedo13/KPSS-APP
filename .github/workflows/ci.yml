name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend (Fastify)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-for-ci-only
          LLM_DRY_RUN: 'true'

  # ─── Worker ────────────────────────────────────────────────────────────────
  worker:
    name: Worker (BullMQ)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          LLM_DRY_RUN: 'true'

  # ─── Admin ─────────────────────────────────────────────────────────────────
  admin:
    name: Admin (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ─── Mobile ────────────────────────────────────────────────────────────────
  mobile:
    name: Mobile (Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # ─── Docker Build (no push — operator must enable push manually) ────────────
  # IMPORTANT: Docker image push is intentionally commented out.
  # Uncomment and configure DOCKER_REGISTRY secrets to enable.
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, worker, admin]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t kpss-backend:ci services/backend

      - name: Build worker image
        run: docker build -t kpss-worker:ci services/worker

      - name: Build admin image
        run: docker build -t kpss-admin:ci apps/admin

      # DEPLOY STEP — Commented out intentionally. Operator must enable manually.
      # - name: Push images
      #   run: |
      #     echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
      #     docker push kpss-backend:ci
      #     docker push kpss-worker:ci
      #     docker push kpss-admin:ci
